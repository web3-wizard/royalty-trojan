services:
  - type: web
    name: royalty-trojan-identity
    env: node
    plan: free
    region: oregon
    buildCommand: cd apps/identity-service && pnpm install && pnpm build
    startCommand: node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: RATE_LIMIT_MAX
        value: 200
      - key: RATE_LIMIT_WINDOW
        value: 1 minute
      - key: CACHE_TTL
        value: 3600
      - key: REDIS_URL
        sync: false
